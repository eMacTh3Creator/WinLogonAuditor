name: Build & Release EXE

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: Version to build (e.g. 1.0.0)
        required: true
        default: 1.0.0

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = if ($env:GITHUB_REF -like 'refs/tags/v*') { $env:GITHUB_REF -replace '^refs/tags/v','' }
               else { '${{ github.event.inputs.version }}' }
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Build exe
        shell: pwsh
        run: ./build/Build-Exe.ps1 -Version ${{ steps.ver.outputs.version }}

      - name: Build release notes from CHANGELOG
        id: notes
        shell: pwsh
        run: |
          $v = '${{ steps.ver.outputs.version }}'
          $body = ''
          if (Test-Path CHANGELOG.md) {
            $raw = Get-Content CHANGELOG.md -Raw
            $m = [regex]::Match($raw, "(?s)##\s*\[$([regex]::Escape($v))\][^\n]*\n(.*?)(?=\r?\n##\s*\[|\r?\n\[Unreleased\]:)")
            if ($m.Success) { $body = $m.Groups[1].Value.Trim() }
          }
          $footer = "`n`n---`nStandalone GUI build. Right-click ``WinLogonAuditor.exe`` and **Run as administrator** (needed to read the Security log). Unsigned: SmartScreen -> More info -> Run anyway. Built from ``src/WinLogonAuditor.ps1``."
          if (-not $body) { $body = "Standalone GUI build of WinLogonAuditor $v." }
          Set-Content release-notes.md -Value ($body + $footer) -Encoding UTF8

      - name: Create / update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $v   = "${{ steps.ver.outputs.version }}"
          $tag = "v$v"
          $verExe = "dist/WinLogonAuditor-$v.exe"   # version-stamped (primary)
          $aliasExe = "dist/WinLogonAuditor.exe"     # stable alias for latest-URL
          if (-not (gh release view $tag 2>$null)) {
            gh release create $tag $verExe $aliasExe `
              --title "WinLogonAuditor $tag" `
              --notes-file release-notes.md
          } else {
            gh release edit $tag --notes-file release-notes.md
            gh release upload $tag $verExe $aliasExe --clobber
          }
